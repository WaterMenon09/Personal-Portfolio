      - paragraph [ref=f2e32]: AI/ML Engineer at Cloudly IO and core contributor to Maveric (Linux Foundation Connectivity). I build production reinforcement-learning agents and Bayesian digital twins for AI-native 5G/6G networks — including the end-to-end PPO-based MRO pipeline, which I re-architected from linear to multi-threaded for a 45–55% runtime reduction, and a vectorized handover protocol that runs 5.5× faster on ARM and 18× on Intel. Started in data annotation and QA, learned what good training data looks like from the ground up, and now ship end-to-end ML pipelines from data sim through xApp/rApp deployment.
